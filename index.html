<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Island Keyboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <!-- OUTPUT -->
    <div class="output" id="output"></div>

    <!-- LETTER GRID (ABC STYLE) -->
    <div class="keyboard" id="letters"></div>

    <!-- WORD BAR -->
    <div class="wordbar" id="words"></div>

    <!-- TONE BAR -->
    <div class="tonebar" id="tones"></div>

    <!-- ACTION BAR -->
    <div class="actions">
      <button onclick="clearText()">Clear</button>
      <button onclick="backspace()">Delete</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
